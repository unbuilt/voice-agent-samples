# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: handoff-langgraph-responses-voicelive
displayName: "LangGraph Handoff (Python, Responses, VoiceLive)"
description: >
  Multi-agent customer support handoff demo using LangGraph with triage,
  refund, and order agents. Served through the Responses protocol for
  voice-first scenarios.
metadata:
  voiceLiveCompatible: "true"
  tags:
    - AI Agent Hosting
    - Responses Protocol
    - Bring Your Own
    - LangGraph
    - Handoff
    - Python
template:
  name: handoff-langgraph-responses-voicelive
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    # FOUNDRY_PROJECT_ENDPOINT and APPLICATIONINSIGHTS_CONNECTION_STRING
    # are injected by the platform (hosted) and translated by azd (local)
    # — do NOT declare them here.
    - name: OPENAI_API_KEY
      value: ${OPENAI_API_KEY}
    - name: OPENAI_BASE_URL
      value: ${OPENAI_BASE_URL}
    - name: MODEL
      value: ${MODEL}
